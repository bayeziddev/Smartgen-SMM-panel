<svg width="460" height="120" viewBox="0 0 460 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartGen SMM Panel logo">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <clipPath id="markClip">
      <circle cx="60" cy="60" r="44"/>
    </clipPath>
  </defs>

  <!-- Mark: navy disc -->
  <circle cx="60" cy="60" r="46" fill="#0B1220"/>
  <circle cx="60" cy="60" r="46" fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>

  <g clip-path="url(#markClip)">
    <!-- sun core, sitting low like a sunrise -->
    <circle cx="60" cy="78" r="22" fill="url(#sunGrad)"/>

    <!-- rays that step upward like an ascending growth chart -->
    <g stroke="url(#sunGrad)" stroke-width="6" stroke-linecap="round">
      <line x1="30" y1="70" x2="30" y2="56"/>
      <line x1="42" y1="60" x2="42" y2="40"/>
      <line x1="54" y1="52" x2="54" y2="26"/>
      <line x1="66" y1="46" x2="66" y2="18"/>
      <line x1="78" y1="52" x2="78" y2="30"/>
      <line x1="90" y1="60" x2="90" y2="44"/>
    </g>

    <!-- rising arrow tracing the ray tips -->
    <polyline points="30,58 42,42 54,28 66,20 78,32" fill="none" stroke="#E4262A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="78,32 88,30 80,40" fill="#E4262A"/>
  </g>

  <!-- Bangladesh-green baseline accent under the mark -->
  <rect x="24" y="104" width="72" height="3" rx="1.5" fill="#006A4E"/>

  <!-- Wordmark -->
  <text x="130" y="62" font-family="'Poppins','Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#0B1220">Smart<tspan fill="#F59E0B">Gen</tspan></text>
  <text x="132" y="86" font-family="'Poppins','Segoe UI',sans-serif" font-size="16" font-weight="600" letter-spacing="1" fill="#0F766E">SMM PANEL</text>
  <text x="132" y="104" font-family="'Segoe UI',sans-serif" font-size="12" letter-spacing="2" fill="#5B6B82">GROW FASTER · PAY LESS</text>
</svg>